site_name: scrubjay
site_description: The app/logic for syncing Claude Code across machines — config-sync + transcript relay.
site_url: https://henba1.github.io/scrubjay/
repo_url: https://github.com/henba1/scrubjay
repo_name: henba1/scrubjay
copyright: Copyright &copy; 2026 Hendrik

theme:
  name: material
  logo: favicon.svg
  favicon: favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - content.code.copy
    - toc.follow
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search
  - llmstxt:
      markdown_description: >-
        scrubjay is the app/logic for syncing Claude Code across machines: a git-based
        config sync plus a pluggable, peer-to-peer transcript relay to your own NAS.
        Personal content lives in separate private repos so this one is publishable.
      full_output: llms-full.txt
      sections:
        Overview:
          - index.md
          - concepts.md
          - harnesses.md
        Setup & operation:
          - onboarding.md
          - day-to-day.md
          - reference.md
        Archive & recall:
          - archive-mcp.md
          - slash-commands.md
          - handoff.md
        Transcript relay:
          - transports.md
          - transcript-transport.md
          - durability.md
          - memory-sync.md
          - mirror-host.md

nav:
  - Home: index.md
  - Concepts: concepts.md
  - Harnesses: harnesses.md
  - Onboarding: onboarding.md
  - Day-to-day: day-to-day.md
  - Query the archive (MCP): archive-mcp.md
  - Session hand-off: handoff.md
  - Slash commands: slash-commands.md
  - "Transcripts: relay + NAS": transports.md
  - Reference: reference.md
  - Deep dives:
      - Transcript transport: transcript-transport.md
      - Archive durability: durability.md
      - Memory sync: memory-sync.md
      - Mirror host (git backend): mirror-host.md
